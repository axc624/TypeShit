<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>TypeShift Daily</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 40px 0 90px;
  padding: 0 12px;
}

h1 { margin: 0 0 8px; font-size: 34px; }
.hint { opacity: 0.75; margin: 0 0 10px; }

.columns {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 20px 0;
}

.column {
  width: 84px;
  cursor: pointer;
  user-select: none;
  touch-action: none;
}

.wheel {
  position: relative;
  height: 210px;
  overflow: hidden;
  border-radius: 14px;
  background: #1b1b1b;
  border: 1px solid #333;
}

.wheel::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  top: 70px;
  height: 70px;
  background: rgba(255,255,255,0.08);
}

.strip {
  position: absolute;
  width: 100%;
  transition: transform 420ms cubic-bezier(.22,1.2,.36,1);
}

.cell {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  font-weight: 900;
}

.cell.edge { opacity: 0.55; }

button {
  padding: 10px 16px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
}

#result { margin-top: 12px; font-size: 20px; }
#status { margin-top: 8px; opacity: .9; }
#found { margin-top: 12px; }

.pillwrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.pill {
  background: #222;
  padding: 6px 10px;
  border-radius: 999px;
  font-weight: 900;
}

#overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.65);
}

#overlay.show { display: flex; }

.modal {
  background: #141414;
  border-radius: 16px;
  padding: 20px;
  width: 320px;
}
</style>
</head>

<body>

<h1>TypeShift Daily</h1>
<p class="hint">Swipe or scroll. Middle row forms the word.</p>

<div class="columns" id="columns"></div>

<div>
  <button onclick="submitWord()">Submit</button>
  <button class="secondary" onclick="resetToday()">Reset</button>
</div>

<p id="result"></p>
<div id="status"></div>
<div id="found"></div>

<div id="overlay">
  <div class="modal">
    <h2>🎉 Puzzle Solved!</h2>
    <p id="winText"></p>
    <button onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>

// CONFIG
const wordLength = 5;
const WORDS_PER_PUZZLE = 5;

let ROW_H = 70;
const ACTIVE_ROW = 1;

const columnsDiv = document.getElementById("columns");
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");
const foundEl = document.getElementById("found");
const overlayEl = document.getElementById("overlay");
const winTextEl = document.getElementById("winText");

const cols = [];

let DICT_LIST = [];
let DICT_SET = new Set();

let TARGET_WORDS = [];
let TARGET_SET = new Set();
let FOUND_ANY = new Set();

// RNG
function hashStringToUint32(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}
function mulberry32(seed){
  return function(){
    let t=(seed+=0x6D2B79F5);
    t=Math.imul(t^(t>>>15),t|1);
    t^=t+Math.imul(t^(t>>>7),t|61);
    return ((t^(t>>>14))>>>0)/4294967296;
  }
}
function dayKey(){
  return new Intl.DateTimeFormat("en-CA",{timeZone:"America/Los_Angeles"}).format(new Date());
}

// Dictionary
async function loadDictionary(){
  const res=await fetch("words.txt",{cache:"no-store"});
  const text=await res.text();
  DICT_LIST=text.split(/\r?\n/)
    .map(w=>w.trim().toLowerCase())
    .filter(w=>w.length===wordLength && /^[a-z]+$/.test(w));
  DICT_SET=new Set(DICT_LIST);
  statusEl.textContent=`Loaded ${DICT_LIST.length} words`;
}

// Columns
function buildColumn(i){
  const col=document.createElement("div");
  col.className="column";
  const wheel=document.createElement("div");
  wheel.className="wheel";
  const strip=document.createElement("div");
  strip.className="strip";

  const cells=[];
  for(let r=0;r<3;r++){
    const cell=document.createElement("div");
    cell.className="cell";
    strip.appendChild(cell);
    cells.push(cell);
  }

  wheel.appendChild(strip);
  col.appendChild(wheel);
  columnsDiv.appendChild(col);

  cols[i]={list:["A"],index:0,strip,cells};

  col.addEventListener("wheel",(e)=>{
    e.preventDefault();
    shift(i,e.deltaY>0?1:-1);
  },{passive:false});

  col.addEventListener("click",()=>shift(i,1));
}

function renderColumn(i){
  const c=cols[i];
  const top=c.index-1;
  const mid=c.index;
  const bot=c.index+1;

  c.cells[0].textContent=(top>=0)?c.list[top]:"";
  c.cells[1].textContent=c.list[mid]||"";
  c.cells[2].textContent=(bot<c.list.length)?c.list[bot]:"";
}

function shift(i,dir){
  const c=cols[i];
  const max=c.list.length-1;
  c.index=Math.max(0,Math.min(max,c.index+dir));
  renderColumn(i);
  showCurrentWord();
}

// Word helpers
function currentWord(){
  return cols.map(c=>c.list[c.index]).join("").toLowerCase();
}

function showCurrentWord(){
  resultEl.textContent="Current: "+currentWord().toUpperCase();
}

function updateStatus(){
  statusEl.textContent=
    `Targets found: ${[...TARGET_SET].filter(w=>FOUND_ANY.has(w)).length}/${TARGET_SET.size} • Total words: ${FOUND_ANY.size}`;
}

function renderFound(){
  foundEl.innerHTML=`
    <div class="pillwrap">
      ${[...FOUND_ANY].sort().map(w=>`<span class="pill">${w.toUpperCase()}</span>`).join("")}
    </div>`;
}

function checkWin(){
  const count=[...TARGET_SET].filter(w=>FOUND_ANY.has(w)).length;
  if(count===TARGET_SET.size){
    winTextEl.textContent=`You solved today's hidden puzzle!`;
    overlayEl.classList.add("show");
  }
}

function closeOverlay(){
  overlayEl.classList.remove("show");
}

// Submit
function submitWord(){
  const w=currentWord();
  if(!DICT_SET.has(w)){
    resultEl.textContent="❌ Not a word";
    return;
  }
  if(FOUND_ANY.has(w)){
    resultEl.textContent="↩ Already found";
    return;
  }

  FOUND_ANY.add(w);
  resultEl.textContent="✅ Found "+w.toUpperCase();
  renderFound();
  updateStatus();
  checkWin();
}

// Puzzle generation
function generatePuzzle(){
  const seed=hashStringToUint32("TypeShift|"+dayKey());
  const rng=mulberry32(seed);

  const pool=[...DICT_LIST].sort(()=>rng()-0.5);
  TARGET_WORDS=pool.slice(0,WORDS_PER_PUZZLE);
  TARGET_SET=new Set(TARGET_WORDS);
  FOUND_ANY=new Set();

  for(let i=0;i<wordLength;i++){
    const colLetters=TARGET_WORDS.map(w=>w[i].toUpperCase());
    colLetters.sort(()=>rng()-0.5);
    cols[i].list=colLetters;
    cols[i].index=Math.floor(rng()*colLetters.length);
    renderColumn(i);
  }

  renderFound();
  updateStatus();
  showCurrentWord();
}

function resetToday(){
  overlayEl.classList.remove("show");
  generatePuzzle();
}

// Init
async function init(){
  for(let i=0;i<wordLength;i++) buildColumn(i);
  await loadDictionary();
  generatePuzzle();
}
init();

</script>
</body>
</html>
